
<!DOCTYPE html>

<title>АрхиТип</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f2f2f0;
  color: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.card {
  width: 100%;
  max-width: 420px;
  background: #fff;
  border-radius: 28px;
  overflow: hidden;
  box-shadow: 0 30px 80px rgba(0,0,0,0.08);
}

.photo {
  width: 100%;
  aspect-ratio: 4/5;
  object-fit: cover;
}

.content {
  padding: 26px 24px 28px;
  text-align: center;
}

.logo {
  width: 120px;
  margin: 0 auto 18px;
  display: block;
}

p {
  font-size: 14.5px;
  line-height: 1.6;
  color: #555;
  margin-bottom: 22px;
}

.cta {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 22px;
}

.btn {
  padding: 14px;
  border-radius: 14px;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.2s ease;
}

.btn-primary {
  background: #111;
  color: #fff;
}

.btn-primary:hover {
  transform: translateY(-1px);
  opacity: 0.92;
}

.btn-outline {
  border: 1px solid #ddd;
  color: #111;
}

.btn-outline:hover {
  background: #f7f7f7;
}

.links {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 10px;
}

.links a {
  text-decoration: none;
  color: #444;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  opacity: 0.85;
  transition: 0.2s;
}

.links a:hover {
  opacity: 1;
  transform: translateY(-1px);
}

.icon {
  width: 16px;
  height: 16px;
  filter: grayscale(1) brightness(0);
  opacity: 0.7;
}

.footer {
  margin-top: 18px;
  font-size: 11px;
  color: #aaa;
  letter-spacing: 0.5px;
}
</style>
</head>

<body>

<main class="card">

<img class="photo" src="photo.jpg" />

<section class="content">

<img class="logo" src="logo.jpg" />
